name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set executable bits
        run: |
          chmod +x scripts/*.sh scripts/planner scripts/architecture || true
          chmod +x skills/dev-discipline/scripts/*.sh || true
          chmod +x skills/planner/scripts/*.sh || true
          chmod +x skills/dev-discipline/assets/pre-commit || true
          chmod +x tests/*.sh || true

      - name: Shell syntax check
        run: |
          bash -n scripts/*.sh
          bash -n scripts/planner
          bash -n scripts/architecture
          bash -n skills/dev-discipline/scripts/*.sh
          bash -n skills/planner/scripts/*.sh
          bash -n skills/dev-discipline/assets/pre-commit

      - name: Sync plan template check
        run: ./scripts/sync-plan-template.sh --check

      - name: Docs front matter check
        run: ./scripts/docs-list.sh

      - name: Planner template validation
        run: ./scripts/planner docs/plans/active/plan-template.md

      - name: Architecture validation
        run: ./scripts/validate-architecture.sh ARCHITECTURE.md

      - name: Integration tests
        run: ./scripts/test.sh
